version: 1
events:
  - name: "automation.run.started"
    description: "An automation run has started."
    topic: "automation"
    payloadSchema: "schema/payloads/automation/run.started.schema.json"

  - name: "automation.run.completed"
    description: "An automation run has completed."
    topic: "automation"
    payloadSchema: "schema/payloads/automation/run.completed.schema.json"

  - name: "automation.run.failed"
    description: "An automation run has failed."
    topic: "automation"
    payloadSchema: "schema/payloads/automation/run.failed.schema.json"

  - name: "monitoring.alert.opened"
    description: "A monitoring alert transitioned to an opened state."
    topic: "monitoring"
    payloadSchema: "schema/payloads/monitoring/alert.opened.schema.json"

  - name: "monitoring.alert.resolved"
    description: "A monitoring alert transitioned to a resolved state."
    topic: "monitoring"
    payloadSchema: "schema/payloads/monitoring/alert.resolved.schema.json"

  - name: "membership.user.added"
    description: "A user was added to a domain entity."
    topic: "membership"
    payloadSchema: "schema/payloads/membership/user.added.schema.json"

  - name: "membership.user.removed"
    description: "A user was removed from a domain entity."
    topic: "membership"
    payloadSchema: "schema/payloads/membership/user.removed.schema.json"

  - name: "membership.user.role-changed"
    description: "A user's role or permissions were changed in a domain entity."
    topic: "membership"
    payloadSchema: "schema/payloads/membership/user.role-changed.schema.json"

  - name: "membership.team.added"
    description: "A team was added to a domain entity."
    topic: "membership"
    payloadSchema: "schema/payloads/membership/team.added.schema.json"

  - name: "membership.team.removed"
    description: "A team was removed from a domain entity."
    topic: "membership"
    payloadSchema: "schema/payloads/membership/team.removed.schema.json"

  - name: "membership.team.role-changed"
    description: "A team's role or permissions were changed in a domain entity."
    topic: "membership"
    payloadSchema: "schema/payloads/membership/team.role-changed.schema.json"

  - name: "agent.instance.provisioned"
    description: "An agent or runner instance was provisioned."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.provisioned.schema.json"

  - name: "agent.instance.ready"
    description: "An agent or runner instance is ready to accept work."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.ready.schema.json"

  - name: "agent.instance.job-accepted"
    description: "An agent or runner instance accepted a job."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.job-accepted.schema.json"

  - name: "agent.instance.job-released"
    description: "An agent or runner instance released a job and returned to idle."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.job-released.schema.json"

  - name: "agent.instance.stopping"
    description: "An agent or runner instance began graceful shutdown."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.stopping.schema.json"

  - name: "agent.instance.stopped"
    description: "An agent or runner instance was fully deprovisioned."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.stopped.schema.json"

  - name: "agent.instance.replaced"
    description: "An agent or runner instance was replaced with a clean instance."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.replaced.schema.json"

  - name: "agent.instance.failed"
    description: "An agent or runner instance failed unexpectedly."
    topic: "agent"
    payloadSchema: "schema/payloads/agent/instance.failed.schema.json"

  - name: "autoscaler.pool.scaled-out"
    description: "Pool capacity increased based on queue depth."
    topic: "autoscaler"
    payloadSchema: "schema/payloads/autoscaler/pool.scaled-out.schema.json"

  - name: "autoscaler.pool.scaled-in"
    description: "Pool capacity decreased based on queue depth."
    topic: "autoscaler"
    payloadSchema: "schema/payloads/autoscaler/pool.scaled-in.schema.json"

  - name: "monitoring.queue.depth-changed"
    description: "Queue depth changed and may trigger monitoring alerts."
    topic: "monitoring"
    payloadSchema: "schema/payloads/monitoring/queue.depth-changed.schema.json"
